<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE LED × Braper — Estratégia de Aquisição de Contas Enterprise</title>
<style>
:root{
  --yellow:#E4D33E; --orange:#EB6C42; --pink:#E73968; --purple:#954B9D; --indigo:#5756A0;
  --braper:#f55139;
  --bg:#000000; --ink:#ffffff; --muted:#9aa0a6; --line:rgba(255,255,255,.12);
  --card:rgba(255,255,255,.035); --card2:rgba(255,255,255,.06);
  --grad:linear-gradient(100deg,var(--yellow),var(--orange) 32%,var(--pink) 60%,var(--purple) 82%,var(--indigo));
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
  overflow:hidden;-webkit-font-smoothing:antialiased;}
.stage{position:fixed;inset:0}
.slide{position:absolute;inset:0;padding:7vh 8vw 10vh;display:none;flex-direction:column;justify-content:center;opacity:0}
.slide.active{display:flex;opacity:1;animation:fade .5s ease}
@keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* isotype (três telas) drawn in CSS */
.iso{display:inline-flex;gap:3px;align-items:flex-end;height:1em;vertical-align:-.12em}
.iso i{display:block;width:.26em;border-radius:1px}
.iso i:nth-child(1){height:.74em;background:linear-gradient(160deg,var(--yellow),var(--orange))}
.iso i:nth-child(2){height:1em;background:linear-gradient(160deg,var(--orange),var(--purple))}
.iso i:nth-child(3){height:.86em;background:linear-gradient(160deg,var(--pink),var(--indigo))}

.kicker{font-size:.76rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin-bottom:22px;font-weight:600;display:flex;align-items:center;gap:14px}
.kicker .ph{color:var(--orange);font-weight:800}
h1.title{font-size:clamp(1.85rem,3.6vw,3.3rem);line-height:1.07;font-weight:800;letter-spacing:-.02em;max-width:19ch}
.grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.lead{font-size:clamp(1.02rem,1.45vw,1.35rem);color:#d7d9dc;max-width:60ch;margin-top:20px;line-height:1.5;font-weight:300}
.body{font-size:clamp(.94rem,1.12vw,1.08rem);color:#c6c9cd;max-width:60ch;margin-top:16px;line-height:1.58;font-weight:300}
.body b,.lead b{color:#fff;font-weight:600}

.provoke{margin-top:24px;padding:16px 22px;border-left:3px solid var(--orange);
  background:linear-gradient(90deg,rgba(235,108,66,.10),transparent);
  font-style:italic;font-size:clamp(1rem,1.28vw,1.22rem);color:#fff;max-width:58ch;line-height:1.4;border-radius:0 8px 8px 0}
.provoke::before{content:"“";color:var(--orange);font-weight:800;font-style:normal;margin-right:3px}
.provoke::after{content:"”";color:var(--orange);font-style:normal}

.split{display:grid;grid-template-columns:1.05fr .95fr;gap:46px;align-items:center;width:100%}
@media(max-width:900px){.split{grid-template-columns:1fr;gap:22px}}
.row{display:flex;gap:34px;align-items:center}

.cards{display:grid;gap:15px;margin-top:6px}
.cards.c2{grid-template-columns:1fr 1fr}.cards.c3{grid-template-columns:repeat(3,1fr)}.cards.c4{grid-template-columns:repeat(4,1fr)}
@media(max-width:900px){.cards.c3,.cards.c4{grid-template-columns:1fr 1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:18px;transition:.25s}
.card:hover{background:var(--card2);transform:translateY(-3px);border-color:rgba(255,255,255,.22)}
.card h4{font-size:.98rem;font-weight:700;margin-bottom:7px}
.card p{font-size:.84rem;color:var(--muted);line-height:1.5;font-weight:300}
.card p b{color:#fff;font-weight:600}
.card .tag{font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;font-weight:800;margin-bottom:9px;display:inline-block}

table{width:100%;border-collapse:collapse;margin-top:12px;font-size:clamp(.75rem,.9vw,.9rem)}
th{text-align:left;padding:10px 13px;font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--line);font-weight:800}
td{padding:10px 13px;border-bottom:1px solid rgba(255,255,255,.06);color:#d2d5d8;font-weight:300;vertical-align:top}
tr:hover td{background:rgba(255,255,255,.03)}
td strong{color:#fff;font-weight:700}
.hl{color:var(--yellow);font-weight:600}
.dim{color:var(--muted)}

.viz{display:flex;flex-direction:column;gap:9px;width:100%}
.bar{padding:14px 20px;border-radius:11px;font-weight:700;color:#000;display:flex;justify-content:space-between;align-items:center;font-size:.92rem;gap:12px}
.bar small{font-weight:600;opacity:1;font-size:.78rem;color:rgba(0,0,0,.72)}
.bar.dark{color:#fff}
.bar.dark small{color:rgba(255,255,255,.82)}
.tierwrap{display:flex;flex-direction:column;align-items:center;gap:7px;width:100%}
.tier{border-radius:10px;padding:13px 18px;text-align:center;font-weight:700;color:#000}
.tier small{font-weight:600;font-size:.78rem}
.tier.dark{color:#fff}
.tier.dark small{color:rgba(255,255,255,.85)}

.arc{display:flex;gap:7px;width:100%;align-items:stretch}
.step{flex:1;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:15px 11px;text-align:center;transition:.25s}
.step:hover{background:var(--card2);transform:translateY(-4px)}
.step .n{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.75rem;margin:0 auto 9px;color:#000}
.step h5{font-size:.8rem;font-weight:800;letter-spacing:.03em;margin-bottom:5px}
.step p{font-size:.75rem;color:var(--muted);line-height:1.38}

.tl{display:flex;gap:13px;width:100%}
.tlcol{flex:1;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:18px}
.tlcol .ph{font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;font-weight:800;margin-bottom:9px}
.tlcol p{font-size:.82rem;color:#c6c9cd;line-height:1.48;font-weight:300}
.tlcol .out{margin-top:11px;font-size:.75rem;color:var(--yellow);font-weight:600}

.matrix{position:relative;width:100%;aspect-ratio:1.45/1;max-height:42vh;border-left:2px solid var(--line);border-bottom:2px solid var(--line);margin-top:8px}
.quad{position:absolute;width:50%;height:50%;display:flex;align-items:center;justify-content:center;text-align:center;padding:12px;font-size:.75rem;font-weight:700;color:#cfd2d6}
.axlbl{position:absolute;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700}
.dot{position:absolute;padding:5px 11px;border-radius:99px;font-size:.75rem;font-weight:700;color:#000;transform:translate(-50%,-50%);white-space:nowrap}

.orbit{position:relative;width:100%;aspect-ratio:1.5/1;max-height:44vh}
.center-node{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:118px;height:118px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;text-align:center;font-weight:800;font-size:.8rem;color:#000;z-index:3;box-shadow:0 0 50px rgba(231,57,104,.35)}
.sat{position:absolute;padding:9px 15px;border-radius:99px;background:var(--card2);border:1px solid var(--line);font-size:.78rem;font-weight:600;backdrop-filter:blur(4px)}

/* chrome */
.topbar{position:fixed;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,.06);z-index:50}
.topbar .fill{height:100%;background:var(--grad);transition:width .4s}
.brandtag{position:fixed;top:20px;left:34px;z-index:40;display:flex;align-items:center;gap:12px}
.brandtag img{height:26px;width:auto;display:block;opacity:.96}
.brandtag .x{color:var(--muted);font-size:.85rem}
.brandtag .br{color:var(--braper);font-weight:800;font-size:.92rem;letter-spacing:.04em}

.chapnav{position:fixed;top:18px;right:34px;z-index:40;display:flex;gap:6px}
.chapnav button{background:transparent;border:1px solid var(--line);color:var(--muted);height:30px;padding:0 11px;border-radius:8px;font-size:.75rem;font-weight:800;letter-spacing:.08em;cursor:pointer;transition:.2s}
.chapnav button:hover{color:#fff;border-color:#fff}
.chapnav button.cur{background:var(--orange);border-color:var(--orange);color:#000}
.chapnav button.home{border-color:rgba(245,81,57,.5);color:#f8836f}
.chapnav button.home:hover{background:var(--braper);border-color:var(--braper);color:#fff}
.chapnav button.home.cur{background:var(--braper);border-color:var(--braper);color:#fff}

/* prev/next as vertical stack on the right edge — never covered by the comments panel */
.navside{position:fixed;right:22px;top:50%;transform:translateY(-50%);z-index:48;display:flex;flex-direction:column;gap:12px}
.navside button{background:rgba(255,255,255,.06);border:1px solid var(--line);color:#fff;cursor:pointer;font-size:1.3rem;width:46px;height:46px;border-radius:50%;transition:.2s;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px)}
.navside button:hover{background:var(--orange);color:#000;border-color:var(--orange)}
.counter{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:40;font-size:.82rem;color:var(--muted);font-variant-numeric:tabular-nums;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:99px;padding:7px 18px;backdrop-filter:blur(10px)}
.counter b{color:#fff}
.zone{position:fixed;top:0;bottom:0;width:11vw;z-index:20;cursor:pointer}
.zone.l{left:0}.zone.r{right:90px}

/* comments panel leaves room on the right for the vertical nav (90px) */
.notes{position:fixed;left:0;right:0;bottom:0;max-height:36vh;overflow:auto;background:rgba(10,10,12,.98);border-top:2px solid var(--orange);padding:18px 96px 24px 8vw;z-index:45;transform:translateY(105%);transition:transform .35s ease}
.notes.show{transform:translateY(0)}
.notes .nh{font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;color:var(--orange);font-weight:800;margin-bottom:7px}
.notes p{font-size:.94rem;color:#e3e5e8;line-height:1.6;max-width:90ch;font-weight:300}
.pbtn{position:fixed;bottom:22px;left:34px;z-index:46;background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--muted);border-radius:99px;padding:8px 16px;font-size:.78rem;font-weight:800;letter-spacing:.06em;cursor:pointer;transition:opacity .25s,background .2s,color .2s}
.pbtn:hover{background:var(--orange);color:#000;border-color:var(--orange)}
.pbtn.hidden{opacity:0;pointer-events:none}
/* close button lives inside the panel header */
.notes .closebtn{position:absolute;top:14px;right:96px;background:rgba(255,255,255,.06);border:1px solid var(--line);color:#fff;border-radius:99px;padding:6px 14px;font-size:.75rem;font-weight:800;letter-spacing:.05em;cursor:pointer;transition:.2s}
.notes .closebtn:hover{background:var(--orange);color:#000;border-color:var(--orange)}
.tagline{font-size:.75rem;letter-spacing:.32em;text-transform:uppercase;color:var(--muted);font-weight:600}
.wmlogo{height:34px;margin-bottom:30px}
</style>
</head>

const stage=document.getElementById('stage');
slides.forEach((s,i)=>{const d=document.createElement('div');d.className='slide';d.dataset.ch=s.ch;d.innerHTML=s.html;stage.appendChild(d);});
const els=[...document.querySelectorAll('.slide')];
let cur=0,notesOn=false;
document.getElementById('tot').textContent=slides.length;
const chapStart={};slides.forEach((s,i)=>{if(s.ch>0&&!(s.ch in chapStart))chapStart[s.ch]=i;});
const cn=document.getElementById('chapnav');
const homeBtn=document.createElement('button');homeBtn.textContent='⌂ INÍCIO';homeBtn.className='home';homeBtn.title='Voltar ao início';homeBtn.onclick=()=>go(0);cn.appendChild(homeBtn);
Object.keys(chapStart).forEach(ch=>{const b=document.createElement('button');b.textContent=C[ch];b.onclick=()=>go(chapStart[ch]);b.dataset.ch=ch;cn.appendChild(b);});
function render(){
  els.forEach((e,i)=>e.classList.toggle('active',i===cur));
  document.getElementById('cur').textContent=cur+1;
  document.getElementById('fill').style.width=((cur+1)/slides.length*100)+'%';
  document.getElementById('noteText').textContent=slides[cur].note||'—';
  const ch=slides[cur].ch;
  [...cn.children].forEach(b=>{
    if(b.classList.contains('home')) b.classList.toggle('cur',ch===0);
    else b.classList.toggle('cur',+b.dataset.ch===ch);
  });
}
function go(i){cur=Math.max(0,Math.min(slides.length-1,i));render();}
function next(){go(cur+1);}function prev(){go(cur-1);}
function toggleNotes(){notesOn=!notesOn;document.getElementById('notes').classList.toggle('show',notesOn);document.getElementById('pbtn').classList.toggle('hidden',notesOn);}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '){e.preventDefault();next();}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();prev();}
  else if(e.key==='Home'){go(0);}else if(e.key==='End'){go(slides.length-1);}
  else if(e.key==='n'||e.key==='N'){toggleNotes();}
});
render();
</script>
</body>
</html>

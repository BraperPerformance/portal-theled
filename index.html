<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE LED · Central do Cliente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0A0D;
  --surface:#121217;
  --surface-2:#17171E;
  --line:rgba(255,255,255,.09);
  --line-strong:rgba(255,255,255,.16);
  --text:#FFFFFF;
  --muted:rgba(255,255,255,.56);
  --faint:rgba(255,255,255,.34);
  --amarelo:#E4D33E;
  --laranja:#EB6C42;
  --rosa:#E73968;
  --roxo:#954B9D;
  --azul:#5756A0;
  --grad-full:linear-gradient(-45deg,var(--azul),var(--roxo),var(--rosa),var(--laranja),var(--amarelo));
  --radius:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Poppins',system-ui,sans-serif;
  font-weight:400;
  letter-spacing:.01em;
  line-height:1.65;
  min-height:100vh;
}
::selection{background:var(--rosa);color:#fff}
a{color:inherit}
button{font-family:inherit}

/* ---------- Brand ---------- */
.brand{display:flex;align-items:center;gap:12px;text-decoration:none}
.brand .telas{display:flex;gap:3px;align-items:stretch;height:26px}
.brand .telas span{display:block;border-radius:2px}
.brand .telas .t1{width:15px;background:linear-gradient(-45deg,var(--rosa),var(--laranja),var(--amarelo))}
.brand .telas .t2{width:10px;background:linear-gradient(-45deg,var(--rosa),var(--roxo))}
.brand .telas .t3{width:5px;background:linear-gradient(-45deg,var(--roxo),var(--rosa))}
.brand .word{font-size:1.05rem;letter-spacing:.14em;white-space:nowrap}
.brand .word b{font-weight:800}
.brand .word i{font-style:normal;font-weight:300}

/* ---------- Login ---------- */
.view{display:none}
.view.active{display:block}
#view-login{
  min-height:100vh;
  display:none;
  align-items:center;justify-content:center;
  padding:24px;
  position:relative;overflow:hidden;
}
#view-login.active{display:flex}
#view-login::before{
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(600px 400px at 85% 10%, rgba(149,75,157,.14), transparent 70%),
    radial-gradient(700px 500px at 10% 90%, rgba(235,108,66,.10), transparent 70%);
  pointer-events:none;
}
.login-card{
  width:100%;max-width:420px;
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:20px;
  padding:48px 40px 40px;
  position:relative;z-index:1;
}
.login-card::before{
  content:"";position:absolute;top:0;left:40px;right:40px;height:2px;
  background:var(--grad-full);border-radius:0 0 2px 2px;
}
.login-logo{display:flex;flex-direction:column;align-items:center;gap:16px;margin-bottom:36px}
.login-logo .telas-lg{display:flex;gap:5px;height:56px}
.login-logo .telas-lg span{display:block;border-radius:3px}
.login-logo .telas-lg .t1{width:34px;background:linear-gradient(-45deg,var(--rosa),var(--laranja),var(--amarelo))}
.login-logo .telas-lg .t2{width:22px;background:linear-gradient(-45deg,var(--rosa),var(--roxo))}
.login-logo .telas-lg .t3{width:11px;background:linear-gradient(-45deg,var(--roxo),var(--rosa))}
.login-logo .word-lg{font-size:1.6rem;letter-spacing:.18em}
.login-logo .word-lg i{font-style:normal;font-weight:300}
.login-logo .word-lg b{font-weight:800}
.login-logo .tagline{font-size:.62rem;letter-spacing:.42em;color:var(--faint);text-transform:uppercase;margin-top:-8px}
.login-title{text-align:center;font-size:.72rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin-bottom:28px}
.field{margin-bottom:18px}
.field label{display:block;font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.field input{
  width:100%;padding:13px 16px;
  background:var(--bg);
  border:1px solid var(--line);
  border-radius:10px;
  color:var(--text);
  font-family:inherit;font-size:.95rem;letter-spacing:.02em;
  transition:border-color .2s;
}
.field input:focus{outline:none;border-color:var(--rosa)}
.btn-primary{
  width:100%;padding:14px;
  border:none;border-radius:10px;
  background:var(--grad-full);
  background-size:200% 200%;background-position:70% 50%;
  color:#fff;font-weight:600;font-size:.85rem;letter-spacing:.18em;text-transform:uppercase;
  cursor:pointer;
  transition:background-position .5s, transform .15s;
  margin-top:8px;
}
.btn-primary:hover{background-position:30% 50%}
.btn-primary:active{transform:scale(.985)}
.btn-primary:focus-visible{outline:2px solid #fff;outline-offset:3px}
.login-error{
  display:none;
  margin-top:14px;padding:11px 14px;
  border:1px solid rgba(231,57,104,.4);border-radius:10px;
  background:rgba(231,57,104,.08);
  color:#F1A5BC;
  font-size:.82rem;text-align:center;
}
.login-error.show{display:block}
.login-foot{margin-top:28px;text-align:center;font-size:.7rem;letter-spacing:.14em;color:var(--faint)}

/* ---------- App shell ---------- */
#app{display:none;min-height:100vh}
#app.active{display:block}
.topbar{
  position:sticky;top:0;z-index:50;
  display:flex;align-items:center;gap:20px;
  padding:16px 32px;
  background:rgba(10,10,13,.86);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
}
.topbar .grad-hair{position:absolute;left:0;right:0;bottom:-1px;height:1px;background:var(--grad-full);opacity:.5}
.top-actions{margin-left:auto;display:flex;align-items:center;gap:12px}
.btn-home{
  display:none;
  align-items:center;gap:9px;
  padding:9px 18px 9px 14px;
  border:1px solid var(--line-strong);border-radius:999px;
  background:transparent;color:var(--text);
  font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;font-weight:500;
  cursor:pointer;text-decoration:none;
  transition:border-color .2s, background .2s;
}
.btn-home.show{display:inline-flex}
.btn-home:hover{border-color:var(--rosa);background:rgba(231,57,104,.07)}
.btn-home svg{width:15px;height:15px}
.user-chip{
  display:flex;align-items:center;gap:10px;
  padding:7px 14px 7px 8px;
  border:1px solid var(--line);border-radius:999px;
  font-size:.78rem;color:var(--muted);
}
.user-chip .avatar{
  width:26px;height:26px;border-radius:50%;
  background:var(--grad-full);
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;font-weight:800;color:#fff;
}
.btn-exit{
  display:inline-flex;align-items:center;gap:8px;
  padding:9px 16px;border:none;border-radius:999px;
  background:transparent;color:var(--muted);
  font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;font-weight:500;
  cursor:pointer;transition:color .2s;
}
.btn-exit:hover{color:var(--rosa)}
.btn-exit svg{width:15px;height:15px}

.wrap{max-width:1180px;margin:0 auto;padding:0 32px}

/* ---------- Home ---------- */
.hero{padding:72px 0 48px;text-align:center}
.hero .eyebrow{
  display:inline-block;
  padding:7px 18px;
  border:1px solid var(--line-strong);border-radius:999px;
  font-size:.66rem;letter-spacing:.32em;text-transform:uppercase;color:var(--muted);
  margin-bottom:26px;
}
.hero h1{font-size:clamp(2rem,4.6vw,3.1rem);font-weight:300;letter-spacing:.02em;line-height:1.2}
.hero h1 b{font-weight:800;background:var(--grad-full);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero p{max-width:560px;margin:18px auto 0;color:var(--muted);font-size:.95rem}

.cat-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:18px;padding-bottom:80px;
}
.cat-card{
  position:relative;
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:30px 28px 26px;
  cursor:pointer;text-align:left;color:var(--text);
  transition:transform .22s, border-color .22s, background .22s;
  overflow:hidden;
}
.cat-card::before{
  content:"";position:absolute;top:0;left:0;bottom:0;width:3px;
  background:var(--cat-grad,var(--grad-full));
  opacity:.9;
}
.cat-card:hover{transform:translateY(-4px);border-color:var(--line-strong);background:var(--surface-2)}
.cat-card:focus-visible{outline:2px solid var(--rosa);outline-offset:3px}
.cat-card .cat-tela{
  width:30px;height:44px;border-radius:3px;
  background:var(--cat-grad,var(--grad-full));
  margin-bottom:22px;
}
.cat-card h3{font-size:1.12rem;font-weight:600;letter-spacing:.02em;margin-bottom:8px}
.cat-card p{font-size:.84rem;color:var(--muted);line-height:1.6;margin-bottom:20px}
.cat-card .cat-meta{
  display:flex;align-items:center;justify-content:space-between;
  font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);
}
.cat-card .cat-open{display:inline-flex;align-items:center;gap:7px;font-weight:600;color:var(--text)}
.cat-card .cat-open svg{width:13px;height:13px;transition:transform .2s}
.cat-card:hover .cat-open svg{transform:translateX(4px)}

/* ---------- Category view ---------- */
.cat-head{padding:64px 0 36px;border-bottom:1px solid var(--line);margin-bottom:40px;position:relative}
.cat-head .cat-tela{width:36px;height:54px;border-radius:3px;background:var(--cat-grad,var(--grad-full));margin-bottom:24px}
.cat-head .eyebrow{font-size:.66rem;letter-spacing:.32em;text-transform:uppercase;color:var(--faint);display:block;margin-bottom:10px}
.cat-head h2{font-size:clamp(1.6rem,3.4vw,2.3rem);font-weight:300;letter-spacing:.02em}
.cat-head h2 b{font-weight:800}
.cat-head p{max-width:640px;color:var(--muted);font-size:.92rem;margin-top:12px}

.doc-section{margin-bottom:56px}
.doc-section > .sec-label{
  display:flex;align-items:center;gap:14px;
  font-size:.68rem;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);
  margin-bottom:20px;
}
.doc-section > .sec-label::after{content:"";flex:1;height:1px;background:var(--line)}
.doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.doc-card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:26px 24px 22px;
  display:flex;flex-direction:column;
  transition:transform .2s,border-color .2s;
}
.doc-card:hover{transform:translateY(-3px);border-color:var(--line-strong)}
.doc-tag{
  align-self:flex-start;
  padding:5px 12px;border-radius:999px;
  font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;font-weight:600;
  background:rgba(255,255,255,.06);color:var(--muted);
  border:1px solid var(--line);
  margin-bottom:16px;
}
.doc-card h4{font-size:1rem;font-weight:600;letter-spacing:.01em;line-height:1.4;margin-bottom:8px}
.doc-card p{font-size:.82rem;color:var(--muted);line-height:1.6;flex:1;margin-bottom:20px}
.doc-link{
  display:inline-flex;align-items:center;gap:8px;
  font-size:.74rem;letter-spacing:.18em;text-transform:uppercase;font-weight:600;
  text-decoration:none;color:var(--text);
  transition:color .2s;
}
.doc-link svg{width:13px;height:13px;transition:transform .2s}
.doc-link:hover{color:var(--laranja)}
.doc-link:hover svg{transform:translateX(4px)}
.doc-soon{
  display:inline-flex;align-items:center;gap:8px;
  font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--faint);
}
.doc-soon::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--faint)}
.empty{
  border:1px dashed var(--line-strong);border-radius:var(--radius);
  padding:56px 32px;text-align:center;color:var(--muted);font-size:.9rem;
}
.empty b{color:var(--text);font-weight:600;display:block;margin-bottom:6px;font-size:1rem}

/* ---------- Guia ---------- */
.guia-body{max-width:760px;padding-bottom:90px}
.guia-block{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:30px 32px;margin-bottom:16px;
}
.guia-block h4{display:flex;align-items:center;gap:14px;font-size:1rem;font-weight:600;margin-bottom:10px}
.guia-block h4 .dot{width:9px;height:22px;border-radius:2px;flex-shrink:0}
.guia-block p{font-size:.88rem;color:var(--muted)}
.guia-block p + p{margin-top:10px}
.guia-block code{
  background:rgba(255,255,255,.07);border:1px solid var(--line);
  border-radius:6px;padding:2px 8px;font-size:.82rem;color:var(--text);
  font-family:ui-monospace,monospace;letter-spacing:0;
}

/* ---------- Footer ---------- */
.foot{
  border-top:1px solid var(--line);
  padding:28px 32px;margin-top:20px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
  font-size:.72rem;letter-spacing:.14em;color:var(--faint);
}
.foot .grad-dot{display:inline-flex;gap:3px;height:12px;margin-right:10px;vertical-align:middle}
.foot .grad-dot span{display:block;border-radius:1px}
.foot .grad-dot .t1{width:7px;background:linear-gradient(-45deg,var(--rosa),var(--laranja),var(--amarelo))}
.foot .grad-dot .t2{width:5px;background:linear-gradient(-45deg,var(--rosa),var(--roxo))}
.foot .grad-dot .t3{width:3px;background:linear-gradient(-45deg,var(--roxo),var(--rosa))}

/* ---------- Motion / responsive ---------- */
.fade-in{animation:fadeUp .5s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
}
@media (max-width:640px){
  .topbar{padding:14px 18px;gap:12px}
  .wrap{padding:0 18px}
  .user-chip .uname{display:none}
  .btn-home .lbl{display:none}
  .btn-home{padding:9px 12px}
  .hero{padding:52px 0 36px}
  .login-card{padding:40px 26px 32px}
}
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<section id="view-login" class="active">
  <div class="login-card fade-in">
    <div class="login-logo">
      <div class="telas-lg" aria-hidden="true"><span class="t1"></span><span class="t2"></span><span class="t3"></span></div>
      <div class="word-lg"><i>THE</i> <b>LED</b></div>
      <div class="tagline">Infinitas possibilidades</div>
    </div>
    <div class="login-title">Central do Cliente</div>
    <form id="login-form" novalidate>
      <div class="field">
        <label for="in-user">Seu nome</label>
        <input id="in-user" type="text" autocomplete="name" placeholder="Como você quer ser chamado" required>
      </div>
      <div class="field">
        <label for="in-pass">Senha de acesso</label>
        <input id="in-pass" type="password" autocomplete="current-password" placeholder="••••••••••" required>
      </div>
      <button class="btn-primary" type="submit">Entrar na Central</button>
      <div class="login-error" id="login-error">Senha incorreta. Confira o acesso enviado pela equipe Braper.</div>
    </form>
    <div class="login-foot">BRAPER × THE LED · 2026</div>
  </div>
</section>

<!-- ===================== APP ===================== -->
<div id="app">
  <header class="topbar">
    <a class="brand" href="#/portal" aria-label="Ir para o portal">
      <div class="telas" aria-hidden="true"><span class="t1"></span><span class="t2"></span><span class="t3"></span></div>
      <div class="word"><i>THE</i> <b>LED</b></div>
    </a>
    <div class="top-actions">
      <a class="btn-home" id="btn-home" href="#/portal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
        <span class="lbl">Voltar ao portal</span>
      </a>
      <div class="user-chip"><span class="avatar" id="chip-avatar">·</span><span class="uname" id="chip-name">—</span></div>
      <button class="btn-exit" id="btn-exit" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
        Sair
      </button>
    </div>
    <div class="grad-hair" aria-hidden="true"></div>
  </header>

  <main id="main"></main>

  <footer class="foot">
    <span><span class="grad-dot" aria-hidden="true"><span class="t1"></span><span class="t2"></span><span class="t3"></span></span>CENTRAL DO CLIENTE · THE LED</span>
    <span>GESTÃO BRAPER · MÍDIA PAGA & ESTRATÉGIA</span>
  </footer>
</div>

<script>
/* =========================================================
   CONFIGURAÇÃO DE DOCUMENTOS
   Para adicionar um novo material: inclua um objeto no array
   DOCS da categoria correta, com { titulo, desc, tag, arquivo }.
   - "arquivo" é o caminho relativo do HTML (ex.: "docs/relatorio.html").
   - Deixe arquivo:null para exibir o card como "Em breve".
   ========================================================= */
const CATS = [
  {
    id:"planejamento", nome:"Planejamento", label:"PLANEJAMENTO",
    grad:"linear-gradient(-45deg, var(--laranja), var(--amarelo))",
    desc:"Estratégias, propostas e direcionamentos que orientam a operação de mídia paga e as novas frentes da THE LED.",
    intro:"Aqui ficam os materiais estratégicos: propostas de canal, definição de audiências e planos que guiam a evolução da operação."
  },
  {
    id:"relatorios", nome:"Relatórios", label:"RELATÓRIOS",
    grad:"linear-gradient(-45deg, var(--rosa), var(--laranja))",
    desc:"Análises executivas de resultados e as reuniões de status semanais de performance das campanhas.",
    intro:"Leituras de resultado da operação — das análises executivas de pipeline aos acompanhamentos semanais de performance."
  },
  {
    id:"ativacao", nome:"Ativação de Anúncios", label:"ATIVAÇÃO",
    grad:"linear-gradient(-45deg, var(--roxo), var(--rosa))",
    desc:"Estruturas de campanha, criativos e materiais de ativação nos canais Google Ads, Meta Ads e LinkedIn Ads.",
    intro:"Tudo o que sobe para os canais: estruturas de campanha, direcionamento criativo e materiais de ativação."
  },
  {
    id:"financeiro", nome:"Financeiro", label:"FINANCEIRO",
    grad:"linear-gradient(-45deg, var(--azul), var(--roxo))",
    desc:"Distribuição de investimento entre canais, propostas de realocação de verba e acompanhamento do orçamento mensal.",
    intro:"Visão do investimento em mídia: como a verba está distribuída hoje e as propostas de realocação entre canais."
  },
  {
    id:"guia", nome:"Guia da Central", label:"GUIA",
    grad:"var(--grad-full)",
    desc:"Como esta Central funciona: navegação, categorias, atualizações e a quem recorrer em cada assunto.",
    intro:""
  }
];

const DOCS = {
  planejamento:[
    { titulo:"Estratégia de Aquisição · Contas Enterprise", tag:"Estratégia",
      desc:"Proposta estratégica de aquisição de contas enterprise: leitura do cenário atual, canais e o caminho para buscar o alto ticket com método.",
      arquivo:"docs/plan-aquisicao-enterprise.html" },
    { titulo:"Mídia Paga e Tickets Altos · 2026 YTD", tag:"Planejamento",
      desc:"Como a mídia paga participa da geração de oportunidades de alto ticket no acumulado de 2026, com base nos dados reais do CRM.",
      arquivo:"docs/plan-midia-paga-ticket-alto-2026.html" }
  ],
  relatorios:[
    { titulo:"Audiência Impactada · 2026", tag:"Audiência",
      desc:"Quem a THE LED está alcançando com as campanhas: leitura da audiência impactada nos canais ao longo de 2026.",
      arquivo:"docs/report-audiencia-impactada-2026.html" },
    { titulo:"Proteção de Marca · Maio 2026", tag:"Marca",
      desc:"Análise do leilão de marca: como o termo THE LED está sendo disputado nos buscadores e a leitura de proteção da marca.",
      arquivo:"docs/report-protecao-marca-maio2026.html" }
  ],
  status:[
    { titulo:"Status Semanal · 29/05/2026", tag:"Performance",
      desc:"Acompanhamento semanal de performance das campanhas: resultados, leitura do especialista e próximos passos.",
      arquivo:"docs/status-semanal-2026-05-29.html" }
    /* Para publicar um novo status, adicione uma linha acima seguindo o mesmo formato:
       { titulo:"Status Semanal · 05/06/2026", tag:"Performance", desc:"...", arquivo:"docs/status-semanal-2026-06-05.html" } */
  ],
  ativacao:[],
  financeiro:[]
};

/* ===================== Estado ===================== */
const PASS = "theled2026#";
let session = { nome:null }; // sessão em memória — sair encerra o acesso

const $ = s => document.querySelector(s);
const viewLogin = $("#view-login");
const app = $("#app");
const main = $("#main");
const btnHome = $("#btn-home");

/* ===================== Login ===================== */
$("#login-form").addEventListener("submit", e=>{
  e.preventDefault();
  const nome = $("#in-user").value.trim() || "Visitante";
  const pass = $("#in-pass").value;
  if(pass !== PASS){
    $("#login-error").classList.add("show");
    $("#in-pass").value = "";
    $("#in-pass").focus();
    return;
  }
  $("#login-error").classList.remove("show");
  session.nome = nome;
  $("#chip-name").textContent = nome;
  $("#chip-avatar").textContent = nome.charAt(0).toUpperCase();
  viewLogin.classList.remove("active");
  app.classList.add("active");
  location.hash = "#/portal";
  render();
});

$("#btn-exit").addEventListener("click", ()=>{
  session.nome = null;
  app.classList.remove("active");
  viewLogin.classList.add("active");
  $("#in-user").value = ""; $("#in-pass").value = "";
  location.hash = "";
  window.scrollTo(0,0);
  $("#in-user").focus();
});

/* ===================== Router ===================== */
window.addEventListener("hashchange", render);

function render(){
  if(!session.nome) return;
  const h = location.hash || "#/portal";
  const catMatch = h.match(/^#\/cat\/(\w+)/);
  window.scrollTo(0,0);
  if(catMatch){
    const cat = CATS.find(c=>c.id===catMatch[1]);
    if(!cat){ location.hash="#/portal"; return; }
    btnHome.classList.add("show");
    main.innerHTML = cat.id==="guia" ? tplGuia(cat) : tplCategoria(cat);
  } else {
    btnHome.classList.remove("show");
    main.innerHTML = tplPortal();
  }
}

/* ===================== Templates ===================== */
const arrowSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>';

function countDocs(id){
  if(id==="relatorios") return DOCS.relatorios.length + DOCS.status.length;
  if(id==="guia") return null;
  return (DOCS[id]||[]).length;
}

function tplPortal(){
  const nome = session.nome.split(" ")[0];
  const cards = CATS.map((c,i)=>{
    const n = countDocs(c.id);
    const meta = n===null ? "COMO FUNCIONA" : (n===1 ? "1 MATERIAL" : n+" MATERIAIS");
    return `
    <button class="cat-card fade-in" style="--cat-grad:${c.grad};animation-delay:${i*70}ms" onclick="location.hash='#/cat/${c.id}'">
      <div class="cat-tela" aria-hidden="true"></div>
      <h3>${c.nome}</h3>
      <p>${c.desc}</p>
      <div class="cat-meta"><span>${meta}</span><span class="cat-open">Abrir ${arrowSvg}</span></div>
    </button>`;
  }).join("");
  return `
  <div class="wrap">
    <section class="hero fade-in">
      <span class="eyebrow">THE LED · CENTRAL DO CLIENTE · 2026</span>
      <h1>Olá, ${nome}. Bem-vindo à <b>Central do Cliente</b>.</h1>
      <p>Todos os materiais de planejamento, relatórios, ativação e investimento da operação de mídia da THE LED, organizados em um só lugar.</p>
    </section>
    <section class="cat-grid">${cards}</section>
  </div>`;
}

function docCard(d, i){
  const action = d.arquivo
    ? `<a class="doc-link" href="${d.arquivo}" target="_blank" rel="noopener">Abrir documento ${arrowSvg}</a>`
    : `<span class="doc-soon">Em breve</span>`;
  return `
  <article class="doc-card fade-in" style="animation-delay:${i*60}ms">
    <span class="doc-tag">${d.tag}</span>
    <h4>${d.titulo}</h4>
    <p>${d.desc}</p>
    ${action}
  </article>`;
}

function tplCategoria(cat){
  let sections = "";
  if(cat.id==="relatorios"){
    const execs = DOCS.relatorios.map(docCard).join("");
    const status = DOCS.status.length
      ? `<div class="doc-grid">${DOCS.status.map(docCard).join("")}</div>`
      : `<div class="empty fade-in"><b>Nenhum status publicado ainda</b>Os relatórios semanais de performance das campanhas aparecem aqui assim que forem publicados.</div>`;
    sections = `
      <section class="doc-section"><div class="sec-label">Análises executivas</div><div class="doc-grid">${execs}</div></section>
      <section class="doc-section"><div class="sec-label">Reuniões de status · semanais</div>${status}</section>`;
  } else {
    const docs = DOCS[cat.id]||[];
    sections = docs.length
      ? `<section class="doc-section"><div class="doc-grid">${docs.map(docCard).join("")}</div></section>`
      : `<div class="empty fade-in" style="margin-bottom:80px"><b>Categoria pronta para receber materiais</b>Assim que os primeiros documentos desta frente forem publicados, eles aparecem aqui.</div>`;
  }
  return `
  <div class="wrap">
    <section class="cat-head fade-in" style="--cat-grad:${cat.grad}">
      <div class="cat-tela" aria-hidden="true"></div>
      <span class="eyebrow">CENTRAL DO CLIENTE · ${cat.label}</span>
      <h2><b>${cat.nome}</b></h2>
      <p>${cat.intro}</p>
    </section>
    ${sections}
    <div style="height:40px"></div>
  </div>`;
}

function tplGuia(cat){
  const bloco = (grad, titulo, corpo) => `
    <div class="guia-block fade-in">
      <h4><span class="dot" style="background:${grad}"></span>${titulo}</h4>
      ${corpo}
    </div>`;
  return `
  <div class="wrap">
    <section class="cat-head fade-in" style="--cat-grad:${cat.grad}">
      <div class="cat-tela" aria-hidden="true"></div>
      <span class="eyebrow">CENTRAL DO CLIENTE · GUIA</span>
      <h2>Como funciona a <b>Central do Cliente</b></h2>
      <p>Um só endereço para tudo o que produzimos na parceria Braper × THE LED — sempre atualizado, sempre acessível.</p>
    </section>
    <div class="guia-body">
      ${bloco("linear-gradient(-45deg,var(--laranja),var(--amarelo))","O que é a Central",
        `<p>A Central do Cliente reúne todos os materiais da operação de mídia e estratégia da THE LED: planejamentos, relatórios de resultado, materiais de ativação e a visão de investimento. Cada documento abre em uma nova aba, no formato interativo em que foi produzido.</p>`)}
      ${bloco("linear-gradient(-45deg,var(--rosa),var(--laranja))","Como navegar",
        `<p>Na tela inicial, cada card representa uma categoria. Ao entrar em uma delas, o botão <code>← Voltar ao portal</code> aparece no topo da página — ele leva você de volta à tela inicial a qualquer momento. O logo THE LED no canto superior esquerdo também retorna ao portal.</p>
         <p>Para encerrar o acesso, use o botão <code>Sair</code> no canto superior direito.</p>`)}
      ${bloco("linear-gradient(-45deg,var(--roxo),var(--rosa))","As categorias",
        `<p><b style="color:var(--text)">Planejamento</b> — estratégias e propostas que orientam a operação: audiências, novos canais e novas frentes.</p>
         <p><b style="color:var(--text)">Relatórios</b> — análises executivas de resultado e, dentro dela, a seção <b style="color:var(--text)">Reuniões de Status</b>, com os acompanhamentos semanais de performance das campanhas.</p>
         <p><b style="color:var(--text)">Ativação de Anúncios</b> — estruturas de campanha e materiais que sobem para Google Ads, Meta Ads e LinkedIn Ads.</p>
         <p><b style="color:var(--text)">Financeiro</b> — distribuição do investimento mensal entre canais e propostas de realocação de verba.</p>`)}
      ${bloco("linear-gradient(-45deg,var(--azul),var(--roxo))","Atualizações e novos materiais",
        `<p>A Central é atualizada pela equipe Braper conforme novos materiais são finalizados. Documentos marcados como <code>Em breve</code> já estão em produção e serão liberados nas próximas atualizações.</p>
         <p>Os status semanais são publicados após cada reunião de acompanhamento de performance.</p>`)}
      ${bloco("var(--grad-full)","Dúvidas e solicitações",
        `<p>Qualquer dúvida sobre os materiais, ou solicitação de novos documentos, fale diretamente com a equipe Braper pelos canais habituais. Este acesso é de uso exclusivo da equipe THE LED.</p>`)}
    </div>
  </div>`;
}

/* foco inicial */
$("#in-user").focus();
</script>
</body>
</html>
